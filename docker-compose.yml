# Stack lokal & produksi: Postgres + Redis + Backend API + Blast Worker.
# Dev cepat: `docker compose up -d postgres redis` lalu jalankan backend di host.
# Full: `docker compose up -d --build`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: populi
      POSTGRES_PASSWORD: populi
      POSTGRES_DB: populi
    ports:
      # Host 5433 → hindari bentrok dengan PostgreSQL native di 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U populi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://populi:populi@postgres:5432/populi?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: node dist/queue/worker.js
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://populi:populi@postgres:5432/populi?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
