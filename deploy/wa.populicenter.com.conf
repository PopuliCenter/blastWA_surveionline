# =============================================================================
# Server block: wa.populicenter.com  →  app WA (kontainer wa_frontend via "web")
# Pola identik dengan survei.populicenter.com.conf (edge nginx survey-populicenter).
#
# PORT 80 WAJIB: zona populicenter.com di Cloudflare = SSL "Flexible" → CF konek
# origin via HTTP :80. server_name eksakt menang atas catch-all "_" app lama.
# Block 443 disertakan (cert Origin SAN *.populicenter.com) bila nanti pindah Full.
#
# Pasang: mount file ini ke edge nginx lalu reload (lihat deploy/README.md).
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wa.populicenter.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 12m;

    # Resolver Docker + variabel → edge nginx tetap start walau app WA sedang turun.
    resolver 127.0.0.11 valid=30s;
    set $wa_upstream wa_frontend;

    location / {
        proxy_pass http://$wa_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
