# Stack produksi app WA — wa.risetcenter.com
# Project name "survei-wa" → kontainer wa_frontend / wa_backend / wa_worker / dst.
# TANPA buka port host (3000/5432/6379) agar tidak bentrok app lain.
# Frontend gabung ke network "web" (bersama edge nginx) → diproxy via nama "wa_frontend".
#
# Jalankan dari folder ini:
#   docker compose -f docker-compose.prod.yml up -d --build
name: survei-wa

services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_URL: https://wa.risetcenter.com
    container_name: wa_frontend
    restart: unless-stopped
    networks: [internal, web]
    depends_on:
      backend: { condition: service_healthy }

  backend:
    build: ../backend
    container_name: wa_backend
    command: sh -c "npx -y prisma migrate deploy && node dist/server.js"
    env_file: [../backend/.env]
    environment:
      DATABASE_URL: postgresql://populi:${POSTGRES_PASSWORD:?isi POSTGRES_PASSWORD di deploy/.env}@postgres:5432/populi?schema=public
      REDIS_URL: redis://redis:6379
      BAILEYS_AUTH_DIR: /app/.baileys-auth
      ERROR_LOG_FILE: /app/logs/backend.log
    volumes:
      - baileys_auth:/app/.baileys-auth # sesi WhatsApp Langsung (QR) — bertahan saat restart
      - /var/log/populi-wa:/app/logs # log error terstruktur — bisa di-tail dari host
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    build: ../backend
    container_name: wa_worker
    command: node dist/queue/worker.js
    env_file: [../backend/.env]
    environment:
      DATABASE_URL: postgresql://populi:${POSTGRES_PASSWORD:?isi POSTGRES_PASSWORD di deploy/.env}@postgres:5432/populi?schema=public
      REDIS_URL: redis://redis:6379
      # Blast Baileys: worker tak punya socket → teruskan kirim ke backend (pemilik socket).
      INTERNAL_API_URL: http://wa_backend:3000
      ERROR_LOG_FILE: /app/logs/worker.log
    volumes:
      - /var/log/populi-wa:/app/logs # log error terstruktur — bisa di-tail dari host
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: populi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?isi POSTGRES_PASSWORD di deploy/.env}
      POSTGRES_DB: populi
    volumes: [pgdata:/var/lib/postgresql/data]
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U populi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"] # persistence AOF → job antrian selamat saat restart
    volumes: [redisdata:/data]
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  internal:
  web:
    external: true

volumes:
  pgdata:
  redisdata:
  baileys_auth:
