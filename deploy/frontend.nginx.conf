# Nginx internal container "wa_frontend": sajikan SPA + proxy API/webhook ke backend.
# Diakses oleh edge nginx (survey-populicenter-nginx-1) lewat network "web".
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    # Resolver Docker + variabel → nginx tetap start walau backend sedang turun.
    resolver 127.0.0.11 valid=30s;
    set $backend wa_backend;

    # API → backend Fastify
    location /api/ {
        proxy_pass http://$backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Webhook WhatsApp/Qontak → backend
    location /webhook/ {
        proxy_pass http://$backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health { proxy_pass http://$backend:3000; }

    # SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
